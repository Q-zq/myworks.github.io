<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽毛球技巧指南</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 40px;
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            border-bottom: 3px solid #3498db;
            padding-bottom: 15px;
        }
        
        .header-image {
            display: block;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 100%;
            height: auto;
        }
        
        .content {
            margin-top: 30px;
        }
        
        .tip-section {
            margin-bottom: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        
        h2 {
            color: #3498db;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        ul {
            list-style-type: none;
            margin-left: 20px;
        }
        
        li {
            margin-bottom: 10px;
            position: relative;
            padding-left: 20px;
        }
        
        li::before {
            content: "•";
            color: #3498db;
            font-weight: bold;
            position: absolute;
            left: 0;
        }
        
        a {
            color: #3498db;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        a:hover {
            color: #2980b9;
            text-decoration: underline;
        }
        
        .important-note {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-weight: bold;
            color: #856404;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>羽毛球技巧指南</h1>
        
        <img src="DSC_5312 - 副本.jpg" alt="羽毛球" class="header-image" longdesc="翡翠湖" />
        
        <div class="content">
            <div class="tip-section">
                <h2>挥拍技巧</h2>
                <p>挥拍，<a href="笛卡尔小论.htm">落球点是稳定的</a>，而不是追着球【跑】，等球到落点。</p>
            </div>
            
            <div class="tip-section">
                <h2>步伐技巧</h2>
                <p>步伐，转体很重要，左脚前脚掌落地，留住转体的力</p>
                <ul>
                    <li>去后场：侧身并步退，快又稳（前脚掌着地）前脚收后脚撤</li>
                    <li>去前场：交叉步，一脚交叉一脚跨</li>
                    <li>之字移动：一脚蹬地一脚转</li>
                    <li>垫步接杀：脚趾发力移动</li>
                </ul>
            </div>
            
            <div class="tip-section">
                <h2><a href="Untitled-3.html">杀球技巧</a></h2>
                <ul>
                    <li>引拍到击球点都不发力，到最高点的瞬间才发力</li>
                    <li>手臂带动手腕形成自然外旋发力</li>
                    <li>球速度，手指手腕的爆发力，多小引拍挥拍练习</li>
                </ul>
            </div>
            
            <div class="important-note">
                *全都要两脚分开微微屈膝
            </div>
            
            <div style="margin-top: 20px; text-align: center;">
                <a href="笛卡尔小论.htm">笛卡尔小论.htm</a>
            </div>
        </div>
    </div>
</body>
</html>
