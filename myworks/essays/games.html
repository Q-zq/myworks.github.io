<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恐怖乐园</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        /* 背景效果 */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(128, 0, 128, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 128, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(128, 0, 128, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 60% 20%, rgba(0, 128, 0, 0.05) 0%, transparent 50%);
            animation: backgroundPulse 10s ease-in-out infinite;
        }
        
        @keyframes backgroundPulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
        }
        
        /* 噪点效果 */
        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJhIiB4PSIwIiB5PSIwIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc1IiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxwYXRoIGZpbHRlcj0idXJsKCNhKSIgb3BhY2l0eT0iLjA1IiBkPSJNMCAwaDMwMHYzMDBIMHoiLz48L3N2Zz4=');
            pointer-events: none;
        }
        
        /* 标题 */
        .title {
            font-size: 3em;
            text-align: center;
            margin-bottom: 60px;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            font-weight: bold;
            letter-spacing: 3px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            from {
                text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            }
            to {
                text-shadow: 0 0 30px #00ff00, 0 0 50px #00ff00;
            }
        }
        
        /* 游戏容器 */
        .games-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 100%;
            width: 90%;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        /* 游戏卡片 */
        .game-card {
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(128, 0, 128, 0.3);
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            border-color: #00ff00;
        }
        
        /* 游戏标题 */
        /* 游戏标题 */
        .game-title {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 10px currentColor;
            position: relative;
            display: inline-block;
        }
        
        /* 小幽灵 */
        .ghost {
            position: absolute;
            font-size: 1.2em;
            animation: ghostFloat 2s ease-in-out infinite;
        }
        
        .ghost-left {
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .ghost-right {
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        @keyframes ghostFloat {
            0%, 100% {
                transform: translateY(-50%) translateY(0);
                opacity: 0.8;
            }
            50% {
                transform: translateY(-50%) translateY(-10px);
                opacity: 1;
            }
        }
        
        /* 游戏描述 */
        .game-desc {
            font-size: 0.8em;
            color: #ccc;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .game-desc::before, .game-desc::after {
            content: '"';
            color: #ff00ff;
            font-size: 1.2em;
        }
        
        /* 游戏链接 */
        .game-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: rgba(128, 0, 128, 0.5);
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
            border: 1px solid #ff00ff;
        }
        
        .game-link:hover {
            background-color: rgba(0, 128, 0, 0.5);
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }
        
        /* 像素装饰 */
        .pixel-decoration {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: #ff00ff;
            animation: pixelFloat 3s ease-in-out infinite;
        }
        
        @keyframes pixelFloat {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        /* 回到首页链接 */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            text-decoration: none;
            padding: 10px 15px;
            background-color: rgba(128, 0, 128, 0.3);
            border-radius: 5px;
            transition: all 0.3s ease;
            border: 1px solid #ff00ff;
        }
        
        .back-link:hover {
            background-color: rgba(0, 128, 0, 0.3);
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .games-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .title {
                font-size: 2em;
            }
            
            .game-card {
                padding: 15px;
                height: 180px;
            }
            
            .game-title {
                font-size: 1.1em;
            }
            
            .game-desc {
                font-size: 0.75em;
            }
            
            .game-link {
                padding: 8px 16px;
                font-size: 0.9em;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 1.5em;
            }
            
            .game-card {
                padding: 12px;
                height: 160px;
            }
            
            .game-title {
                font-size: 1em;
            }
            
            .game-desc {
                font-size: 0.7em;
            }
            
            .back-link {
                padding: 8px 12px;
                font-size: 0.9em;
            }
        }
        
        /* 中等屏幕优化 */
        @media (min-width: 769px) and (max-width: 1024px) {
            .games-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* 大屏幕优化 */
        @media (min-width: 1200px) {
            .games-container {
                max-width: 1200px;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="noise"></div>
    
    <a href="index.html" class="back-link">← 回到首页</a>
    
    <h1 class="title">恐怖乐园</h1>
    
    <div class="games-container">
        <!-- 傲慢 -->
        <div class="game-card">
            <h2 class="game-title">
                <span class="ghost ghost-left" style="color: #ff6666;">👻</span>
                傲慢
            </h2>
            <p class="game-desc">在一个充满镜子的迷宫中，面对自己的傲慢与虚荣</p>
            <a href="#" class="game-link">开始游戏</a>
        </div>
        
        <!-- 荒诞 -->
        <div class="game-card">
            <h2 class="game-title">
                荒诞
                <span class="ghost ghost-right" style="color: #ff66ff;">👾</span>
            </h2>
            <p class="game-desc">在一个逻辑混乱的世界里，寻找意义与出口</p>
            <a href="#" class="game-link">开始游戏</a>
        </div>
        
        <!-- 浪漫 -->
        <div class="game-card">
            <h2 class="game-title">
                <span class="ghost ghost-left" style="color: #66ff66;">👼</span>
                浪漫
            </h2>
            <p class="game-desc">在恐怖与温柔之间，探索爱情的真谛</p>
            <a href="#" class="game-link">开始游戏</a>
        </div>
        
        <!-- 懦弱 -->
        <div class="game-card">
            <h2 class="game-title">
                懦弱
                <span class="ghost ghost-right" style="color: #6666ff;">😨</span>
            </h2>
            <p class="game-desc">面对内心的恐惧，突破自我的极限</p>
            <a href="potion_game.html" class="game-link">开始游戏</a>
        </div>
        
        <!-- 璀璨 -->
        <div class="game-card">
            <h2 class="game-title">
                <span class="ghost ghost-left" style="color: #ffff66;">✨</span>
                璀璨
            </h2>
            <p class="game-desc">在黑暗中寻找光明，在绝望中发现希望</p>
            <a href="#" class="game-link">开始游戏</a>
        </div>
        
        <!-- 忍耐 -->
        <div class="game-card">
            <h2 class="game-title">
                忍耐
                <span class="ghost ghost-right" style="color: #ff9966;">😶</span>
            </h2>
            <p class="game-desc">在无尽的折磨中，保持内心的平静</p>
            <a href="tetris.html" class="game-link">开始游戏</a>
        </div>
        
        <!-- 植物大战僵尸 -->
        <div class="game-card">
            <h2 class="game-title">
                <span class="ghost ghost-left" style="color: #66ff99;">🌱</span>
                植物大战僵尸
            </h2>
            <p class="game-desc">用植物抵御僵尸的入侵，保卫你的家园</p>
            <a href="plants-vs-zombies/index.html" class="game-link">开始游戏</a>
        </div>
    </div>
    
    <!-- 像素装饰元素 -->
    <div class="pixel-decoration" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
    <div class="pixel-decoration" style="top: 60%; left: 85%; animation-delay: 0.5s;"></div>
    <div class="pixel-decoration" style="top: 30%; left: 90%; animation-delay: 1s;"></div>
    <div class="pixel-decoration" style="top: 70%; left: 5%; animation-delay: 1.5s;"></div>
    <div class="pixel-decoration" style="top: 40%; left: 50%; animation-delay: 2s;"></div>
    
    <script>
        // 添加更多随机像素装饰
        for (let i = 0; i < 20; i++) {
            const pixel = document.createElement('div');
            pixel.className = 'pixel-decoration';
            pixel.style.top = Math.random() * 100 + '%';
            pixel.style.left = Math.random() * 100 + '%';
            pixel.style.animationDelay = Math.random() * 3 + 's';
            pixel.style.backgroundColor = Math.random() > 0.5 ? '#ff00ff' : '#00ff00';
            document.body.appendChild(pixel);
        }
    </script>
</body>
</html>
