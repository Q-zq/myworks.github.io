        <h1>离故乡渐渐远了</h1>
        <p>离故乡渐渐远了，乡愁像一碗奶奶做的鱼汤，也许并不那么美味，但那是她一大早起来，上早市去买的最好的黄骨鱼，光是她亲切热乎的话语便是鱼汤的七分鲜美。</p>
        <p>我这人，只要一念起家乡两字，大抵总有道不尽的温情和感怀。譬如，老家的猫还好吗，在他出门溜达的时候有没有一刻是在找我；幼年住的老屋还好吗，房梁有没有趁我不在的时候偷偷掉下；小时候和伙伴们一起寻的秘密基地还在吗，青涩的时光里我们用黄泥巴和草叶玩过家家；小河沟里是不是每到春天还有那么多小蝌蚪，我们长大了是不是还有小孩儿去抓……</p>
