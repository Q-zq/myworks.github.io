<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药水选择</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* 背景效果 */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(128, 0, 128, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0, 0, 128, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(128, 0, 128, 0.1) 0%, transparent 70%);
            animation: backgroundPulse 8s ease-in-out infinite;
        }
        
        @keyframes backgroundPulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
        }
        
        /* 噪点效果 */
        .noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJhIiB4PSIwIiB5PSIwIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc1IiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PGZlQ29sb3JNYXRyaXggdHlwZT0ic2F0dXJhdGUiIHZhbHVlcz0iMCIvPjwvZmlsdGVyPjxwYXRoIGZpbHRlcj0idXJsKCNhKSIgb3BhY2l0eT0iLjA1IiBkPSJNMCAwaDMwMHYzMDBIMHoiLz48L3N2Zz4=');
            pointer-events: none;
        }
        
        /* 标题 */
        .title {
            font-size: 2.5em;
            text-align: center;
            margin-bottom: 40px;
            color: #ff66ff;
            text-shadow: 0 0 20px #ff66ff;
            font-weight: bold;
            letter-spacing: 2px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        
        @keyframes titleGlow {
            from {
                text-shadow: 0 0 20px #ff66ff;
            }
            to {
                text-shadow: 0 0 30px #6666ff;
            }
        }
        
        /* 魔女容器 */
        .witch-container {
            margin-bottom: 60px;
            text-align: center;
        }
        
        /* 魔女图像 */
        .witch-image {
            width: 300px;
            height: auto;
            animation: witchFloat 4s ease-in-out infinite;
            border: none;
            box-shadow: 0 8px 25px rgba(255, 102, 255, 0.4);
            transition: all 0.3s ease;
        }
        
        .witch-image:hover {
            box-shadow: 0 12px 35px rgba(255, 102, 255, 0.6);
            transform: scale(1.05);
        }
        
        @keyframes witchFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        /* 药水容器 */
        .potions-container {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            margin-top: -40px;
        }
        
        /* 药水瓶 */
        .potion {
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 133px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(128, 0, 128, 0.3);
        }
        
        .potion:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 102, 255, 0.5);
        }
        
        /* 红色药水 */
        .potion-red {
            border-color: #ff6666;
        }
        
        .potion-red:hover {
            box-shadow: 0 0 30px rgba(255, 102, 102, 0.5);
        }
        
        /* 蓝色药水 */
        .potion-blue {
            border-color: #6666ff;
        }
        
        .potion-blue:hover {
            box-shadow: 0 0 30px rgba(102, 102, 255, 0.5);
        }
        
        /* 药水图标 */
        .potion-icon {
            width: 53px;
            height: 80px;
            margin: 0 auto 10px;
            position: relative;
        }
        
        .potion-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
            box-shadow: 0 4px 15px rgba(255, 102, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .potion:hover .potion-icon img {
            box-shadow: 0 6px 20px rgba(255, 102, 255, 0.5);
            transform: translateY(-5px);
        }
        
        .potion-red:hover .potion-icon img {
            box-shadow: 0 6px 20px rgba(255, 102, 102, 0.5);
        }
        
        .potion-blue:hover .potion-icon img {
            box-shadow: 0 6px 20px rgba(102, 102, 255, 0.5);
        }
        
        /* 药水名称 */
        .potion-name {
            font-size: 1em;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 0 0 10px currentColor;
        }
        
        /* 药水描述 */
        .potion-desc {
            font-size: 0.8em;
            color: #ccc;
            font-style: italic;
        }
        
        /* 开始按钮 */
        .start-button {
            padding: 15px 30px;
            background-color: rgba(128, 0, 128, 0.5);
            color: #fff;
            border: 2px solid #ff66ff;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .start-button:hover {
            background-color: rgba(102, 0, 102, 0.7);
            box-shadow: 0 0 20px rgba(255, 102, 255, 0.5);
            transform: scale(1.05);
        }
        
        /* 回到首页链接 */
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            text-decoration: none;
            padding: 10px 15px;
            background-color: rgba(128, 0, 128, 0.3);
            border-radius: 5px;
            transition: all 0.3s ease;
            border: 1px solid #ff66ff;
        }
        
        .back-link:hover {
            background-color: rgba(102, 0, 102, 0.5);
            box-shadow: 0 0 10px rgba(255, 102, 255, 0.5);
        }
        
        /* 像素装饰 */
        .pixel-decoration {
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: #ff66ff;
            animation: pixelFloat 3s ease-in-out infinite;
        }
        
        @keyframes pixelFloat {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            50% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .potions-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                margin-top: -30px;
            }
            
            .title {
                font-size: 2em;
            }
            
            .witch-image {
                width: 200px;
            }
            
            .potion {
                width: 120px;
                padding: 15px;
            }
            
            .potion-icon {
                width: 45px;
                height: 65px;
            }
            
            .potion-name {
                font-size: 0.9em;
            }
            
            .potion-desc {
                font-size: 0.7em;
            }
            
            .start-button {
                padding: 12px 24px;
                font-size: 1em;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 1.5em;
                margin-bottom: 20px;
            }
            
            .witch-image {
                width: 150px;
            }
            
            .potions-container {
                margin-top: -25px;
            }
            
            .potion {
                width: 100px;
                padding: 12px;
            }
            
            .potion-icon {
                width: 35px;
                height: 50px;
            }
            
            .potion-name {
                font-size: 0.8em;
            }
            
            .potion-desc {
                font-size: 0.6em;
            }
            
            .start-button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
            
            .back-link {
                padding: 8px 12px;
                font-size: 0.9em;
            }
        }
        
        /* 大屏幕优化 */
        @media (min-width: 1200px) {
            .games-container {
                max-width: 1000px;
            }
            
            .witch-image {
                width: 350px;
            }
            
            .potion {
                width: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="noise"></div>
    
    <a href="games.html" class="back-link">← 回到游戏列表</a>
    
    <h1 class="title">选择你的命运</h1>
    
    <div class="witch-container">
        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=witch%20with%20blue%20hair%20wearing%20black%20hat%20and%20cloak%20with%20black%20cat%20on%20shoulder%2C%20dark%20mysterious%20atmosphere%2C%20digital%20art%2C%20portrait&image_size=portrait_4_3" alt="女巫" class="witch-image">
    </div>
    
    <div class="potions-container">
        <!-- 红色药水 -->
        <div class="potion potion-red" onclick="selectPotion('red')">
            <div class="potion-icon">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=red%20magical%20potion%20bottle%20with%20gold%20cross%20design%2C%20glass%20flask%20with%20cork%20stopper%2C%20surrounded%20by%20roses%2C%20vintage%20alchemical%20style%2C%20detailed%20illustration&image_size=square" alt="红色药水">
            </div>
            <h2 class="potion-name">懦弱无罪</h2>
            <p class="potion-desc">当危险降临，懦弱，已成守卫</p>
        </div>
        
        <!-- 蓝色药水 -->
        <div class="potion potion-blue" onclick="selectPotion('blue')">
            <div class="potion-icon">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=purple%20magical%20potion%20bottle%20with%20gold%20stars%20and%20constellations%2C%20glass%20flask%20with%20cork%20stopper%2C%20starry%20night%20sky%20inside%2C%20vintage%20alchemical%20style%2C%20detailed%20illustration&image_size=square" alt="蓝色药水">
            </div>
            <h2 class="potion-name">迷迭香之吻</h2>
            <p class="potion-desc">在迷迭香的气味中，寻找内心的平静</p>
        </div>
    </div>
    
    <a href="#" class="start-button" id="startButton" onclick="startGame()">开始游戏</a>
    
    <!-- 像素装饰元素 -->
    <div class="pixel-decoration" style="top: 20%; left: 10%; animation-delay: 0s;"></div>
    <div class="pixel-decoration" style="top: 60%; left: 90%; animation-delay: 0.5s;"></div>
    <div class="pixel-decoration" style="top: 30%; left: 80%; animation-delay: 1s;"></div>
    <div class="pixel-decoration" style="top: 70%; left: 15%; animation-delay: 1.5s;"></div>
    
    <script>
        let selectedPotion = null;
        
        // 药水图像选项
        const redPotionImages = [
            "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=red%20magical%20potion%20bottle%20with%20gold%20cross%20design%2C%20glass%20flask%20with%20cork%20stopper%2C%20surrounded%20by%20roses%2C%20vintage%20alchemical%20style%2C%20detailed%20illustration&image_size=square",
            "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=small%20red%20potion%20bottle%20with%20cork%20stopper%2C%20vintage%20alchemical%20style%2C%20roses%20around%2C%20detailed%20illustration&image_size=square"
        ];
        
        const bluePotionImages = [
            "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=purple%20magical%20potion%20bottle%20with%20gold%20stars%20and%20constellations%2C%20glass%20flask%20with%20cork%20stopper%2C%20starry%20night%20sky%20inside%2C%20vintage%20alchemical%20style%2C%20detailed%20illustration&image_size=square",
            "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=small%20purple%20potion%20bottle%20with%20gold%20decorations%2C%20starry%20design%2C%20vintage%20alchemical%20style%2C%20detailed%20illustration&image_size=square"
        ];
        
        // 随机选择药水图像
        function randomizePotionImages() {
            const redPotionImg = document.querySelector('.potion-red .potion-icon img');
            const bluePotionImg = document.querySelector('.potion-blue .potion-icon img');
            
            redPotionImg.src = redPotionImages[Math.floor(Math.random() * redPotionImages.length)];
            bluePotionImg.src = bluePotionImages[Math.floor(Math.random() * bluePotionImages.length)];
        }
        
        // 页面加载时随机选择药水图像
        window.onload = function() {
            randomizePotionImages();
        };
        
        // 添加更多随机像素装饰
        for (let i = 0; i < 15; i++) {
            const pixel = document.createElement('div');
            pixel.className = 'pixel-decoration';
            pixel.style.top = Math.random() * 100 + '%';
            pixel.style.left = Math.random() * 100 + '%';
            pixel.style.animationDelay = Math.random() * 3 + 's';
            pixel.style.backgroundColor = Math.random() > 0.5 ? '#ff66ff' : '#6666ff';
            document.body.appendChild(pixel);
        }
        
        // 选择药水
        function selectPotion(color) {
            selectedPotion = color;
            
            // 重置所有药水样式
            document.querySelectorAll('.potion').forEach(potion => {
                potion.style.transform = 'scale(1)';
                potion.style.boxShadow = '0 0 20px rgba(128, 0, 128, 0.3)';
            });
            
            // 高亮选中的药水
            const selectedPotionEl = document.querySelector('.potion-' + color);
            selectedPotionEl.style.transform = 'scale(1.1)';
            selectedPotionEl.style.boxShadow = color === 'red' 
                ? '0 0 30px rgba(255, 102, 102, 0.7)' 
                : '0 0 30px rgba(102, 102, 255, 0.7)';
        }
        
        // 开始游戏
        function startGame() {
            if (!selectedPotion) {
                alert('请先选择一瓶药水');
                return;
            }
            
            // 这里可以根据选择的药水跳转到不同的游戏场景
            alert('你选择了' + (selectedPotion === 'red' ? '红色药水：懦弱无罪' : '蓝色药水：迷迭香之吻'));
            // 后续可以添加游戏逻辑
        }
    </script>
</body>
</html>
